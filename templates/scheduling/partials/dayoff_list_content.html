{% if requests %}
<div class="divide-y divide-gray-200 dark:divide-gray-700">
    {% for dayoff in requests %}
        {% include 'scheduling/partials/request_row.html' with is_manager=is_manager %}
    {% endfor %}
</div>
{% else %}
<!-- Empty State -->
<div class="p-12 text-center">
    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
    </svg>
    <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">No requests</h3>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
        {% if is_manager %}
        No day-off requests to review.
        {% else %}
        Get started by creating a new time-off request.
        {% endif %}
    </p>
</div>
{% endif %}
