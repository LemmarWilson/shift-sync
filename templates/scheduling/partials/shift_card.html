<div class="shift-card rounded-lg shadow-sm p-3 cursor-pointer transition-all
            {% if shift.is_own %}
            bg-white dark:bg-gray-700 border border-solid border-gray-200 dark:border-gray-600 hover:shadow-md
            {% else %}
            bg-gray-50 dark:bg-gray-800 border border-dashed border-gray-300 dark:border-gray-600 opacity-60 hover:opacity-80
            {% endif %}"
     style="border-left: 4px solid {{ shift.employee.color }};"
     id="shift-{{ shift.id }}"
     hx-get="{% url 'scheduling:shift_detail' pk=shift.pk %}"
     hx-target="#modal-content"
     hx-trigger="click"
     @htmx:after-request="$dispatch('open-modal')">

    <!-- Employee Name with "Me" Badge -->
    <div class="flex items-center space-x-2 mb-1">
        <div class="w-2 h-2 rounded-full" style="background-color: {{ shift.employee.color }};"></div>
        <span class="text-sm font-medium text-gray-900 dark:text-white truncate">
            {{ shift.employee.get_full_name|default:shift.employee.username }}
        </span>
        {% if shift.is_own %}
        <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300">
            Me
        </span>
        {% endif %}
    </div>

    <!-- Time Range -->
    <div class="text-xs text-gray-500 dark:text-gray-400">
        {{ shift.start_time|time:"g:i A" }} - {{ shift.end_time|time:"g:i A" }}
    </div>

    <!-- Status Badge and Publish Toggle -->
    <div class="mt-2 flex items-center justify-between">
        {% if not shift.published %}
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-200">
            Draft
        </span>
        {% else %}
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-200">
            Published
        </span>
        {% endif %}

        {% if request.user.is_manager %}
        <!-- Publish Toggle Button (manager only) -->
        <button hx-post="{% url 'scheduling:shift_toggle_publish' pk=shift.pk %}"
                hx-target="#shift-{{ shift.id }}"
                hx-swap="outerHTML"
                @click.stop
                class="p-2 sm:p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors"
                title="{% if shift.published %}Unpublish shift{% else %}Publish shift{% endif %}">
            {% if shift.published %}
            <!-- Eye-off icon for unpublish -->
            <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
            </svg>
            {% else %}
            <!-- Eye icon for publish -->
            <svg class="w-4 h-4 text-indigo-500 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
            </svg>
            {% endif %}
        </button>
        {% endif %}
    </div>
</div>
