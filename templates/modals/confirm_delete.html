<div class="p-6">
<div class="text-center space-y-4">
    <!-- Warning Icon -->
    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 dark:bg-red-900/30">
        <svg class="h-6 w-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
    </div>

    <!-- Message -->
    <div>
        <h3 class="text-lg font-medium text-gray-900 dark:text-white">Delete Shift?</h3>
        <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
            This will permanently delete the shift for<br>
            <strong class="text-gray-700 dark:text-gray-300">{{ shift.employee.get_full_name|default:shift.employee.username }}</strong><br>
            on {{ shift.date|date:"M j, Y" }} ({{ shift.start_time|time:"g:i A" }} - {{ shift.end_time|time:"g:i A" }})
        </p>
    </div>

    <!-- Buttons -->
    <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-center sm:gap-3 pt-4">
        <button @click="$dispatch('close-modal')"
                class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
            Cancel
        </button>
        <button hx-delete="{% url 'scheduling:shift_delete' pk=shift.pk %}"
                hx-swap="none"
                class="px-4 py-2 text-sm font-medium text-white bg-red-500 rounded-lg hover:bg-red-600 transition-colors">
            Delete
        </button>
    </div>
</div>
</div>
